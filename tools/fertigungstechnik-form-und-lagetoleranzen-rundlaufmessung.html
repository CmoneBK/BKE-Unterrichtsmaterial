---
title: "Fertigungstechnik: Form- und Lagetoleranzen - Rundlaufmessung"
---
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertigungstechnik: Form- und Lagetoleranzen - Rundlaufmessung</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 900px;
            justify-content: center;
        }
        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .controls {
            width: 100%;
            margin-top: 15px;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        input[type="range"] {
            width: 100%;
        }
        .stats {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .stat-box {
            text-align: center;
        }
        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Form- und Lagetoleranzen - Rundlaufmessung</h1>

    <div class="container">
        <div class="panel">
            <canvas id="simCanvas" width="300" height="300"></canvas>
            <button id="toggleBtn">Start / Stopp</button>
            
            <div class="controls">
                <div class="control-group">
                    <label for="eccentricity">Exzentrizität (Mittenversatz): <span id="eccVal">50</span> µm</label>
                    <input type="range" id="eccentricity" min="0" max="100" value="50">
                </div>
                <div class="control-group">
                    <label for="ovality">Unrundheit (Ovalität): <span id="ovalVal">10</span> µm</label>
                    <input type="range" id="ovality" min="0" max="50" value="10">
                </div>
                <div class="control-group">
                    <label for="speed">Drehgeschwindigkeit:</label>
                    <input type="range" id="speed" min="1" max="10" value="3">
                </div>
            </div>
        </div>

        <div class="panel">
            <canvas id="graphCanvas" width="400" height="200"></canvas>
            
            <div class="stats">
                <div class="stat-box">
                    <div>Aktuell</div>
                    <div class="stat-value" id="currentVal">0.0</div>
                </div>
                <div class="stat-box">
                    <div>Max</div>
                    <div class="stat-value" id="maxVal">0.0</div>
                </div>
                <div class="stat-box">
                    <div>Min</div>
                    <div class="stat-value" id="minVal">0.0</div>
                </div>
                <div class="stat-box">
                    <div>Rundlauf (TIR)</div>
                    <div class="stat-value" id="tirVal" style="color:#27ae60;">0.0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const simCanvas = document.getElementById('simCanvas');
        const ctxSim = simCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const ctxGraph = graphCanvas.getContext('2d');
        
        const btnToggle = document.getElementById('toggleBtn');
        const inpEcc = document.getElementById('eccentricity');
        const inpOval = document.getElementById('ovality');
        const inpSpeed = document.getElementById('speed');
        
        const outEcc = document.getElementById('eccVal');
        const outOval = document.getElementById('ovalVal');
        const outCurrent = document.getElementById('currentVal');
        const outMax = document.getElementById('maxVal');
        const outMin = document.getElementById('minVal');
        const outTir = document.getElementById('tirVal');

        let isRunning = true;
        let angle = 0;
        const radius = 80; 
        const centerX = simCanvas.width / 2;
        const centerY = simCanvas.height / 2 + 20;
        
        const history = new Array(360).fill(0);
        const scale = 0.3;

        btnToggle.addEventListener('click', () => { isRunning = !isRunning; });
        inpEcc.addEventListener('input', (e) => outEcc.innerText = e.target.value);
        inpOval.addEventListener('input', (e) => outOval.innerText = e.target.value);

        function processSimulation(eccentricity, ovality) {
            ctxSim.clearRect(0, 0, simCanvas.width, simCanvas.height);

            // 1. Zentrum zeichnen
            ctxSim.beginPath();
            ctxSim.arc(centerX, centerY, 3, 0, Math.PI * 2);
            ctxSim.fillStyle = '#333';
            ctxSim.fill();

            // 2. Geometrie der Welle berechnen
            const dx = eccentricity * scale * Math.cos(angle);
            const dy = eccentricity * scale * Math.sin(angle);
            
            // Array zum Speichern der Konturpunkte für die exakte Abtastung
            const contourPoints = [];
            
            ctxSim.beginPath();
            // Erhöhte Auflösung für präzisere Interpolation
            for (let a = 0; a <= Math.PI * 2 + 0.1; a += 0.02) {
                const r = radius + (ovality * scale * Math.cos(2 * (a - angle)));
                const x = centerX + dx + r * Math.cos(a);
                const y = centerY + dy + r * Math.sin(a);
                
                contourPoints.push({x, y});
                
                if (a === 0) ctxSim.moveTo(x, y);
                else ctxSim.lineTo(x, y);
            }
            ctxSim.closePath();
            ctxSim.strokeStyle = '#2c3e50';
            ctxSim.lineWidth = 3;
            ctxSim.stroke();
            ctxSim.fillStyle = '#bdc3c7';
            ctxSim.fill();

            // Referenzlinie zeichnen
            ctxSim.beginPath();
            ctxSim.moveTo(centerX + dx, centerY + dy);
            const refR = radius + (ovality * scale * Math.cos(2 * (-angle)));
            ctxSim.lineTo(centerX + dx + refR * Math.cos(angle), centerY + dy + refR * Math.sin(angle));
            ctxSim.strokeStyle = '#e74c3c';
            ctxSim.lineWidth = 2;
            ctxSim.stroke();

            // 3. Exakten Berührungspunkt des Tasters berechnen (Lineare Interpolation)
            let contactY = centerY - radius; // Fallback
            
            for (let i = 0; i < contourPoints.length - 1; i++) {
                const p1 = contourPoints[i];
                const p2 = contourPoints[i+1];
                
                // Wir suchen das Segment, das die x-Mitte kreuzt und in der oberen Hälfte liegt (y < centerY)
                if (((p1.x <= centerX && p2.x >= centerX) || (p2.x <= centerX && p1.x >= centerX)) && 
                    p1.y < centerY && p2.y < centerY) {
                    
                    // Vermeidung von Division durch Null
                    if (p2.x === p1.x) {
                        contactY = p1.y;
                    } else {
                        // Lineare Interpolation der Y-Koordinate bei exakt X = centerX
                        const t = (centerX - p1.x) / (p2.x - p1.x);
                        contactY = p1.y + t * (p2.y - p1.y);
                    }
                    break;
                }
            }

            // 4. Messwert aus der exakten geometrischen Position ableiten
            // Die Nulllinie des Tasters ist centerY - radius
            const rawMeasurement = ((centerY - radius) - contactY) / scale;
            
            // Minimales Rauschen für Realismus hinzufügen (auf den mathematischen Wert, nicht die Grafik)
            const noise = (Math.random() - 0.5) * 1.0; 
            const finalMeasurement = rawMeasurement + noise;

            // Messwert in die Historie schieben
            history.shift();
            history.push(finalMeasurement);

            // 5. Messuhr zeichnen (exakt auf dem berechneten contactY)
            const probeX = centerX;
            const probeY = contactY;

            ctxSim.beginPath();
            // Gehäuse
            ctxSim.rect(probeX - 15, probeY - 60, 30, 40);
            ctxSim.fillStyle = '#ecf0f1';
            ctxSim.fill();
            ctxSim.stroke();
            
            // Ziffernblatt
            ctxSim.beginPath();
            ctxSim.arc(probeX, probeY - 40, 10, 0, Math.PI * 2);
            ctxSim.fillStyle = '#fff';
            ctxSim.fill();
            ctxSim.stroke();
            
            // Zeiger (Winkel basiert auf dem abgeleiteten Messwert)
            ctxSim.beginPath();
            ctxSim.moveTo(probeX, probeY - 40);
            const needleAngle = finalMeasurement * 0.1;
            ctxSim.lineTo(probeX + 8 * Math.sin(needleAngle), probeY - 40 - 8 * Math.cos(needleAngle));
            ctxSim.strokeStyle = 'red';
            ctxSim.stroke();

            // Tasterstange
            ctxSim.beginPath();
            ctxSim.moveTo(probeX, probeY - 20);
            ctxSim.lineTo(probeX, probeY);
            ctxSim.strokeStyle = '#7f8c8d';
            ctxSim.lineWidth = 4;
            ctxSim.stroke();
            
            // Tasterkugel (Sitzt nun mathematisch garantiert auf der gezeichneten Konturlinie)
            ctxSim.beginPath();
            ctxSim.arc(probeX, probeY, 3, 0, Math.PI * 2);
            ctxSim.fillStyle = '#e74c3c';
            ctxSim.fill();
        }

        function drawGraph() {
            ctxGraph.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            
            ctxGraph.strokeStyle = '#eee';
            ctxGraph.lineWidth = 1;
            ctxGraph.beginPath();
            ctxGraph.moveTo(0, graphCanvas.height / 2);
            ctxGraph.lineTo(graphCanvas.width, graphCanvas.height / 2);
            ctxGraph.stroke();

            ctxGraph.beginPath();
            const step = graphCanvas.width / history.length;
            
            for (let i = 0; i < history.length; i++) {
                const x = i * step;
                const y = (graphCanvas.height / 2) - (history[i] * 0.8);
                
                if (i === 0) ctxGraph.moveTo(x, y);
                else ctxGraph.lineTo(x, y);
            }
            ctxGraph.strokeStyle = '#3498db';
            ctxGraph.lineWidth = 2;
            ctxGraph.stroke();
        }

        function updateStats() {
            let max = -Infinity;
            let min = Infinity;
            for(let val of history) {
                if(val > max) max = val;
                if(val < min) min = val;
            }
            
            const current = history[history.length - 1];
            const tir = max - min; 

            outCurrent.innerText = current.toFixed(1);
            outMax.innerText = max.toFixed(1);
            outMin.innerText = min.toFixed(1);
            outTir.innerText = tir.toFixed(1);
        }

        function animate() {
            if (isRunning) {
                const ecc = parseFloat(inpEcc.value);
                const oval = parseFloat(inpOval.value);
                const speed = parseFloat(inpSpeed.value) * 0.01;

                angle += speed;
                if (angle >= Math.PI * 2) angle -= Math.PI * 2;

                // Alles in einer synchronisierten Funktion verarbeiten
                processSimulation(ecc, oval);
                drawGraph();
                updateStats();
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
